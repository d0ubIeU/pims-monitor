name: Daily BfDI PHP Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, mbstring, libxml

      - name: Get current date
        id: date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run PHP Scraper
        id: scraper
        run: php monitor.php
        continue-on-error: true

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "BfDI Sync: Monitoring update for ${{ env.CURRENT_DATE }}"
          file_pattern: 'pims_registry.json'
          commit_user_name: "BfDI Monitor Bot"
          commit_user_email: "bfdi-monitor-bot@users.noreply.github.com"

      - name: Create Alert Issue
        if: steps.scraper.outcome == 'failure'
        run: |
          DETAILED_INFO="${{ steps.scraper.outputs.details }}"
          if [ -z "$DETAILED_INFO" ]; then
            DETAILED_INFO="Changes detected or script error occurred."
          fi
          
          gh issue create \
            --title "⚠️ Alert: BfDI Website Change Detected (${{ env.CURRENT_DATE }})" \
            --body "Changes: $DETAILED_INFO"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
