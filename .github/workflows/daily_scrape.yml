name: Daily BfDI PHP Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, mbstring, libxml

      - name: Get current date
        id: date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run PHP Scraper
        id: scraper
        run: php monitor.php
        continue-on-error: true

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "BfDI Sync: Monitoring update for ${{ env.CURRENT_DATE }}"
          file_pattern: 'pims_registry.json'
          commit_user_name: "BfDI Monitor Bot"
          commit_user_email: "bfdi-monitor-bot@users.noreply.github.com"
          commit_author: "BfDI Monitor Bot <bfdi-monitor-bot@users.noreply.github.com>"
          
      - name: Create Detailed Alert Issue
        if: steps.scraper.outcome == 'failure'
        run: |
          # Retrieve the detailed list of changes
          CHANGES="${{ steps.scraper.outputs.details }}"
          if [ -z "$CHANGES" ]; then
            CHANGES="No specific details available. Please check the commit diff or script logs."
          fi

          echo "Change detected. Creating GitHub Issue."
          
          gh issue create \
            --title "⚠️ Alert: BfDI PIMS Registry Change Detected (${{ env.CURRENT_DATE }})" \
            --body "### 🔍 Scraper Update Summary
            **Date:** ${{ env.CURRENT_DATE }}
            **Status:** Content Change or Deactivation Detected
            
            #### Detected Changes:
            $CHANGES
            
            Detailed changes can be viewed in the updated [pims_registry.json](${{ github.server_url }}/${{ github.repository }}/blob/main/pims_registry.json)."
          
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
