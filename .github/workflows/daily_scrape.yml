# Name of the workflow as it appears in the GitHub Actions tab
name: Daily BfDI PHP Scraper

on:
  # Automated trigger: Runs every day at 01:00 UTC
  schedule:
    - cron: '0 1 * * *'
  
  # Manual trigger: Allows you to run the script via the "Run workflow" button in GitHub
  workflow_dispatch:

jobs:
  scrape_and_commit:
    # Uses the latest Ubuntu environment provided by GitHub
    runs-on: ubuntu-latest
    
    # Critical: Grants the workflow permission to write changes and create issues
    permissions:
      contents: write
      issues: write

    steps:
      # Step 1: Downloads the current repository content to the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Sets up the PHP environment with necessary extensions for HTML parsing
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          # 'dom' and 'libxml' are required for PHP's DOMDocument class
          # 'mbstring' ensures correct character encoding (e.g., German Umlauts)
          extensions: dom, mbstring, libxml

      # Step 3: Generates a dynamic date string to be used in the commit message
      - name: Get current date
        id: date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # Step 4: Executes the PHP scraping script
      - name: Run PHP Scraper
        id: scraper
        run: php monitor.php
        continue-on-error: true

      # Step 5: Commit changes
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-Update: PIMS Registry updated on ${{ env.CURRENT_DATE }}"
          file_pattern: 'pims_registry.json'
          commit_user_name: "BfDI Monitor Bot"
          commit_user_email: "bfdi-monitor-bot@users.noreply.github.com"

      # Step 6: Create Issue and Fail (English version with details)
      - name: Check for Alert and Notify
        if: steps.scraper.outcome == 'failure'
        run: |
          # Use the output from PHP or a default message if empty
          DETAILED_INFO="${{ steps.scraper.outputs.details }}"
          if [ -z "$DETAILED_INFO" ]; then
            DETAILED_INFO="Changes detected or script error occurred. Please check the logs."
          fi

          echo "Changes detected. Creating GitHub Issue for notification."
          gh issue create \
            --title "⚠️ Alert: BfDI Website Change Detected (${{ env.CURRENT_DATE }})" \
            --body "### Scraper Update Summary
            **Date:** ${{ env.CURRENT_DATE }}
            **Status:** Modification Detected
            
            **Details:**
            $DETAILED_INFO
            
            Please review the changes in [pims_registry.json](${{ github.server_url }}/${{ github.repository }}/blob/main/pims_registry.json)."
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
