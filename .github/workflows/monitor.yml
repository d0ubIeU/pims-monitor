name: PIMS Registry Monitor

on:
  schedule:
    - cron: '0 0 * * *' # Täglich um Mitternacht
  workflow_dispatch: # Erlaubt manuelles Starten zum Testen

jobs:
  check-bfdi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        id: scraper
        run: node index.js
        continue-on-error: true # Erlaubt den Push auch bei gefundenen Änderungen (Error)

      - name: Commit and Push if changed
        run: |
          git config --global user.name "PIMS-Bot"
          git config --global user.email "bot@github.com"
          git add pims_registry.json
          # Wir generieren das Datum im Format DD.MM.YYYY
          CURRENT_DATE=$(date +'%d.%m.%Y')
          # Nur committen und pushen, wenn sich die Datei tatsächlich geändert hat
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update PIMS Registry - $CURRENT_DATE" && git push)

      - name: Trigger Email Alert
        if: steps.scraper.outcome == 'failure'
        run: exit 1 # Erzeugt den Status "Failed" für die E-Mail-Benachrichtigung
