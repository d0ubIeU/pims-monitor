name: PIMS Registry Monitor

on:
  schedule:
    - cron: '0 0 * * *' # Täglich um Mitternacht
  workflow_dispatch: # Erlaubt manuelles Starten zum Testen

jobs:
  check-bfdi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        id: scraper
        run: node index.js

      - name: Commit and Push if changed
        run: |
          git config --global user.name "PIMS-Bot"
          git config --global user.email "bot@github.com"
          git add pims_registry.json
          git commit -m "Update PIMS Registry" || exit 0
          git push
